<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23111'/%3E%3Cg transform='translate(15,12) scale(0.7)'%3E%3Cpath d='M60 130 C55 130 48 125 46 118 L42 95 C40 88 42 80 48 76 L55 72 C58 70 62 70 65 72 L70 76 C72 74 76 72 80 72 L84 74 C87 72 91 71 95 72 L99 74 C102 72 106 72 109 74 L113 77 C116 75 120 75 123 78 L126 82 C129 80 133 80 136 83 L138 88 C141 86 145 87 147 91 L148 96 C150 100 150 105 148 110 L144 125 C141 132 134 136 127 136 L60 130Z' fill='%23e8e0d8'/%3E%3Cpath d='M46 118 L38 108 C35 103 36 97 40 94 L48 88' stroke='%23e8e0d8' stroke-width='14' stroke-linecap='round' fill='none'/%3E%3Cpath d='M55 135 L50 165 C49 170 52 174 57 175 L128 175 C133 174 136 170 135 165 L130 135' fill='%23e8e0d8'/%3E%3C/g%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="game-container">
        <header class="header">
            <h1 class="title">Rock Paper Scissors</h1>
            <p class="subtitle">Designed & Developed by Awaizalam Patel</p>
        </header>

        <div class="scoreboard">
            <div class="score-card player-score">
                <span class="score-label">You</span>
                <span class="score-value" id="playerScore">0</span>
            </div>
            <div class="score-divider">
                <span class="vs-text">VS</span>
            </div>
            <div class="score-card computer-score">
                <span class="score-label">Machine</span>
                <span class="score-value" id="computerScore">0</span>
            </div>
        </div>

        <div class="battle-arena">
            <div class="hand-display" id="playerHandDisplay">
                <div class="hand-label">Your Hand</div>
                <div class="hand-container" id="playerHand"></div>
            </div>

            <div class="battle-status" id="battleStatus">
                <span class="status-text" id="statusText">Pick your hand</span>
            </div>

            <div class="hand-display" id="computerHandDisplay">
                <div class="hand-label">Machine Hand</div>
                <div class="hand-container" id="computerHand"></div>
            </div>
        </div>

        <div class="controls">
            <button class="hand-btn" data-choice="rock" id="btnRock">
                <div class="btn-hand" id="btnRockHand"></div>
                <span class="btn-label">Rock</span>
            </button>
            <button class="hand-btn" data-choice="paper" id="btnPaper">
                <div class="btn-hand" id="btnPaperHand"></div>
                <span class="btn-label">Paper</span>
            </button>
            <button class="hand-btn" data-choice="scissors" id="btnScissors">
                <div class="btn-hand" id="btnScissorsHand"></div>
                <span class="btn-label">Scissors</span>
            </button>
        </div>

        <div class="game-stats">
            <div class="stat">
                <span class="stat-value" id="totalGames">0</span>
                <span class="stat-label">Rounds</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="wins">0</span>
                <span class="stat-label">Wins</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="losses">0</span>
                <span class="stat-label">Losses</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="draws">0</span>
                <span class="stat-label">Draws</span>
            </div>
        </div>

        <div class="action-buttons">
            <button class="reset-btn" id="resetBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                Reset Score
            </button>
        </div>

        <div class="history-section">
            <h3 class="history-title">Recent Rounds</h3>
            <div class="history-list" id="historyList">
                <div class="history-empty">No rounds played yet</div>
            </div>
        </div>

        <footer class="footer">
            <p>Built with precision. No luck involved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
